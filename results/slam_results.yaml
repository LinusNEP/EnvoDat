# EnvoDat SLAM leaderboard data
# --------------------------------
# Metric conventions:
#   ate_rmse : Absolute Trajectory Error [m]      -> lower is better
#   rpe_rmse : Relative Pose Error (delta=1) [m]  -> lower is better
#   sd       : Scale Drift (optimal = 1.0, <1 underestimates scale, >1 overestimates scale; best = closest to 1)

track: slam
scenes:
  - id: mu-hall-01
    label: "MU-Hall-01"
    characteristic: "Dynamic entities"
  - id: mu-txn-01
    label: "MU-TXN-01"
    characteristic: "Varying illumination, opaque surfaces"
  - id: subt-zab-01
    label: "SubT-ZAB-01"
    characteristic: "Zero/partial visibility"
  - id: mu-cor-03
    label: "MU-Cor-03 (night)"
    characteristic: "Zero/partial visibility"
  - id: leo-str-01
    label: "Leo-Str-01"
    characteristic: "High-dimensional, feature-sparse"

entries:
  - algorithm: "FAST-LIO2"
    category: "LiDAR (filter)"
    reference: "Xu et al., 2022"
    results:
      mu-hall-01:  {ate_rmse: [1.15, 0.67],   rpe_rmse: [0.01, 0.00], sd: [1.13, 0.70]}
      mu-txn-01:   {ate_rmse: [1.51, 0.82],   rpe_rmse: [0.01, 0.00], sd: [1.67, 4.09]}
      subt-zab-01: {ate_rmse: [9.77, 13.51],  rpe_rmse: [1.13, 0.40], sd: [1.95, 6.40]}
      mu-cor-03:   {ate_rmse: [0.87, 0.30],   rpe_rmse: [0.00, 0.00], sd: [1.03, 0.67]}
      leo-str-01:  {ate_rmse: [2.50, 0.40],   rpe_rmse: [0.04, 0.00], sd: [1.02, 0.58]}

  - algorithm: "DLIO"
    category: "LiDAR (filter)"
